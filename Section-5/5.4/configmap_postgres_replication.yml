apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-replication
  namespace: luckydraw
data:
  postgresql.conf: |
    listen_addresses = '*'
    wal_level = replica
    max_wal_senders = 10
    max_replication_slots = 10
    synchronous_commit = on
    synchronous_standby_names = '*'
    hot_standby = on

  pg_hba.conf: |
    host replication postgres 0.0.0.0/0 md5
    host all all 0.0.0.0/0 md5
  
  init-replica.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    if [ "$(hostname)" != "postgres-0" ]; then
      echo "Waiting for primary..."
      until pg_isready -h postgres-0.postgres -p 5432 -U postgres; do
        sleep 5
      done

      if [ ! -f "$PGDATA/PG_VERSION" ]; then
        echo "Running pg_basebackup..."
        pg_basebackup \
          -h postgres-0.postgres \
          -D "$PGDATA" \
          -U postgres \
          -Fp -Xs -P -R
      fi
    fi
