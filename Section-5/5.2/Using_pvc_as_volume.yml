apiVersion: apps/v1
kind: Deployment
metadata:
  name: participate
  namespace: luckydraw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: participate
  template:
    metadata:
      labels:
        app: participate
    spec:
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: logs-pvc
      containers:
      - name: participate
        image: ghcr.io/kul-samples/thinknyx-participate-app:latest
        ports:
        - containerPort: 5000
          name: participate
        resources:
          limits:
            memory: "100Mi"
            cpu: "100m"
          requests:
            memory: "75Mi"
            cpu: "75m"
        envFrom:
        - configMapRef:
            name: redis-connection-details
        volumeMounts:
        - name: logs
          mountPath: /var/log/luckydraw-app
---
