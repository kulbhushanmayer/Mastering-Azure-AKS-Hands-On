kind: Deployment
apiVersion: apps/v1
metadata:
  name: depone
  namespace: thinknyx
  labels:
    app: httpd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: httpd
  template:
    metadata:
      labels:
        app: httpd
    spec:
      nodeSelector:
        poolname: thinknyxpool
      containers:
        - name: httpd
          image: docker.io/library/httpd:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            limits:
              cpu: 100m
              memory: 200Mi
            requests:
              cpu: 50m
              memory: 100Mi
