apiVersion: v1
kind: Namespace
metadata:
  name: luckydraw
  labels:
    name: luckydraw
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: luckydraw
spec:
  selector:
    matchLabels:
      app: redis
  serviceName: redis
  replicas: 1
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:6.2 
        ports:
        - containerPort: 6379
          name: redis-port
        volumeMounts:
        - name: redis-storage
          mountPath: /data
      volumes:
      - name: redis-storage
        hostPath:
          path: /opt/redis-data
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: luckydraw
spec:
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
    name: redis-port
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-connection-details
  namespace: luckydraw
data:
  REDIS_HOST: redis.luckydraw.svc
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: luckydraw
type: Opaque
data:
  POSTGRES_PASSWORD: cG9zdGdyZXM= # encode value for postgres
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-connection-details
  namespace: luckydraw
data:
  POSTGRES_HOST: pgpool.luckydraw.svc
  POSTGRES_PORT: "5432"
  POSTGRES_USER: postgres
  POSTGRES_DB: postgres
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pickwinner-config
  namespace: luckydraw
data:
  ADMIN_USERNAME: admin
  ADMIN_PASSWORD: admin
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: luckydraw
spec:
  selector:
    matchLabels:
      app: postgres
  serviceName: postgres
  replicas: 1
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: default
      resources:
        requests:
          storage: 1Gi
  template:
    metadata:
      labels:
        app: postgres
    spec:
      initContainers:
      - name: init-replica
        image: postgres:15.7
        env:
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_DB
          value: postgres
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: config
          mountPath: /sql
          readOnly: true
        command:
        - /bin/bash
        - /sql/init-replica.sh
      containers:
      - name: postgres
        image: postgres:15.7
        ports:
        - containerPort: 5432
          name: postgres-port
        env:
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        envFrom:
        - secretRef:
            name: postgres-credentials
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: config
          mountPath: /etc/postgresql
          readOnly: true
        command:
        - bash
        - -c
        - |
          exec docker-entrypoint.sh postgres \
            -c config_file=/etc/postgresql/postgresql.conf \
            -c hba_file=/etc/postgresql/pg_hba.conf
      volumes:
      - name: config
        configMap:
          name: postgres-replication
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: luckydraw
  labels:
    app: postgres
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app: postgres
  type: ClusterIP
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: participate
  namespace: luckydraw
spec:
  selector:
    app: participate
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
    name: participate
    nodePort: 30001
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: submissions
  namespace: luckydraw
spec:
  selector:
    app: submissions
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
    name: submissions
    nodePort: 30002
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: pickwinner
  namespace: luckydraw
spec:
  selector:
    app: pickwinner
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
    name: pickwinner
    nodePort: 30003
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: participate
  namespace: luckydraw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: participate
  template:
    metadata:
      labels:
        app: participate
    spec:
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: logs-pvc
      containers:
      - name: participate
        image: ghcr.io/kul-samples/thinknyx-participate-app:latest
        ports:
        - containerPort: 5000
          name: participate
        resources:
          limits:
            memory: "100Mi"
            cpu: "100m"
          requests:
            memory: "75Mi"
            cpu: "75m"
        envFrom:
        - configMapRef:
            name: redis-connection-details
        volumeMounts:
        - name: logs
          mountPath: /var/log/luckydraw-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: submissions
  namespace: luckydraw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: submissions
  template:
    metadata:
      labels:
        app: submissions
    spec:
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: logs-pvc
      containers:
      - name: submissions
        image: ghcr.io/kul-samples/thinknyx-submissions-app:latest
        ports:
        - containerPort: 5000
          name: submissions
        resources:
          limits:
            memory: "100Mi"
            cpu: "100m"
          requests:
            memory: "75Mi"
            cpu: "75m"
        envFrom:
        - configMapRef:
            name: postgres-connection-details
        - secretRef:
            name: postgres-credentials
        volumeMounts:
        - name: logs
          mountPath: /var/log/luckydraw-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pickwinner
  namespace: luckydraw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pickwinner
  template:
    metadata:
      labels:
        app: pickwinner
    spec:
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: logs-pvc
      containers:
      - name: pickwinner
        image: ghcr.io/kul-samples/thinknyx-pick-winner-app:latest
        ports:
        - containerPort: 5000
          name: pickwinner
        resources:
          limits:
            memory: "100Mi"
            cpu: "100m"
          requests:
            memory: "75Mi"
            cpu: "75m"
        envFrom:
        - configMapRef:
            name: postgres-connection-details
        - secretRef:
            name: postgres-credentials
        - configMapRef:
            name: pickwinner-config
        volumeMounts:
        - name: logs
          mountPath: /var/log/luckydraw-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sync-redis-to-postgres
  namespace: luckydraw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sync-redis-to-postgres
  template:
    metadata:
      labels:
        app: sync-redis-to-postgres
    spec:
      volumes:
      - name: logs
        persistentVolumeClaim:
          claimName: logs-pvc
      containers:
      - name: sync-redis-to-postgres
        image: ghcr.io/kul-samples/thinknyx-redis-to-postgres-worker-app:latest
        resources:
          limits:
            memory: "150Mi"
            cpu: "150m"
          requests:
            memory: "100Mi"
            cpu: "100m"
        envFrom:
        - configMapRef:
            name: redis-connection-details
        - configMapRef:
            name: postgres-connection-details
        - secretRef:
            name: postgres-credentials
        env:
        - name: REDIS_POLL_INTERVAL
          value: "5" # Poll Redis every 5 seconds
        volumeMounts:
        - name: logs
          mountPath: /var/log/luckydraw-app
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: logs-pvc
  namespace: luckydraw
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: azurefile
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-replication
  namespace: luckydraw
data:
  postgresql.conf: |
    listen_addresses = '*'
    wal_level = replica
    max_wal_senders = 10
    max_replication_slots = 10
    synchronous_commit = on
    synchronous_standby_names = '*'
    hot_standby = on

  pg_hba.conf: |
    host replication postgres 0.0.0.0/0 md5
    host all all 0.0.0.0/0 md5
  
  init-replica.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    if [ "$(hostname)" != "postgres-0" ]; then
      echo "Waiting for primary..."
      until pg_isready -h postgres-0.postgres -p 5432 -U postgres; do
        sleep 5
      done

      if [ ! -f "$PGDATA/PG_VERSION" ]; then
        echo "Running pg_basebackup..."
        pg_basebackup \
          -h postgres-0.postgres \
          -D "$PGDATA" \
          -U postgres \
          -Fp -Xs -P -R
      fi
    fi
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: luckydraw
type: Opaque
data:
  POSTGRES_PASSWORD: cG9zdGdyZXM= # encode value for postgres
  PGPOOL_ADMIN_PASSWORD: cG9zdGdyZXM=
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
type: Opaque
data:
  POSTGRES_PASSWORD: cG9zdGdyZXM= # encode value for postgres
---
apiVersion: v1
kind: Pod
metadata:
  name: psql
spec:
  containers:
    - name: psql
      image: postgres:15.7
      env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_PASSWORD
      command:
        - /bin/bash
        - -c
        - |
          sleep 7200
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgpool
  namespace: luckydraw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgpool
  template:
    metadata:
      labels:
        app: pgpool
    spec:
      containers:
        - name: pgpool
          image: mrgreen007/pgpool:4.6.4
          env:
            # Backend nodes
            - name: PGPOOL_BACKEND_NODES
              value: "0:postgres-0.postgres:5432,1:postgres-1.postgres:5432,2:postgres-2.postgres:5432"

            # PostgreSQL connection
            - name: PGPOOL_POSTGRES_USERNAME
              value: postgres
            - name: PGPOOL_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD

            # Pgpool administrator user
            - name: PGPOOL_ADMIN_USERNAME
              value: pgpooladmin
            - name: PGPOOL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: PGPOOL_ADMIN_PASSWORD

            # Streaming Replication check user
            - name: PGPOOL_SR_CHECK_USER
              value: postgres
            - name: PGPOOL_SR_CHECK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD

            # PostgreSQL health check user
            - name: PGPOOL_HEALTH_CHECK_USER
              value: postgres
            - name: PGPOOL_HEALTH_CHECK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD

          ports:
            - containerPort: 5432
          resources:
            limits:
              cpu: 500m
              memory: 500Mi

---
apiVersion: v1
kind: Service
metadata:
  name: pgpool
  namespace: luckydraw
spec:
  selector:
    app: pgpool
  ports:
    - port: 5432
---
